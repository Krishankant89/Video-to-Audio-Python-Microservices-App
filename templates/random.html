<!DOCTYPE html>
<html>
<head>
    <title>QuickMeet - Random Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="room-header">
    <span id="status">Connecting...</span>
    <a href="/" style="color:#8ab4f8;">Home</a>
</div>

<div class="video-grid">
    <div class="tile">
        <video id="localVideo" autoplay muted playsinline></video>
        <span class="tile-label">You</span>
    </div>
    <div class="tile hidden" id="remote-tile">
        <video id="remoteVideo" autoplay playsinline></video>
        <span class="tile-label">Stranger</span>
    </div>
</div>

<p class="swipe-hint">Swipe up (mobile) or tap Next to meet someone new</p>

<div class="controls">
    <button id="micBtn" onclick="toggleMic()">Mute</button>
    <button id="camBtn" onclick="toggleCamera()">Camera Off</button>
    <button onclick="skip()" class="btn-primary">⬆ Next</button>
    <button onclick="leaveMeeting()" class="btn-danger">Leave</button>
</div>

<div class="chat-box">
    <div id="chat"></div>
    <div class="chat-input">
        <input id="msg" placeholder="Say hi...">
        <button onclick="sendMsg()">Send</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="{{ url_for('static', filename='random.js') }}"></script>

</body>
</html>
